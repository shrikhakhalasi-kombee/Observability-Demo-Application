server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: laravel-logs
    static_configs:
      - targets:
          - localhost
        labels:
          app: laravel-observability-demo
          environment: local
          __path__: /var/log/app/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
      - labels:
          level:
          trace_id:
